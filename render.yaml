services:
  - type: web
    name: path-puzzles
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LIVE_DAILY_CAP
        value: "3"
      - key: LIVE_PER_IP_HOUR
        value: "6"
